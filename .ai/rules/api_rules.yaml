# Spring Boot API 설계 규칙
api_rules:
  version: "1.0"
  
  # URL 스타일
  url:
    prefix: "/api/v1"
    lowercase: true
    use_hyphen: true
    resource_naming: "plural"
    
  # HTTP 메서드
  http_methods:
    GET: "@GetMapping"
    POST: "@PostMapping"
    PUT: "@PutMapping"
    PATCH: "@PatchMapping"
    DELETE: "@DeleteMapping"
    
  # 응답 형식
  response:
    wrapper_class: "ApiResponse<T>"
    success_format:
      code: 200
      structure:
        success: true
        data: "{}"
        message: "string"
        timestamp: "String"
    error_format:
      structure:
        success: false
        error:
          code: "string"
          message: "string"
          details: "object?"
          timestamp: "String"
          
  # 상태 코드
  status_codes:
    success: [200, 201, 204]
    client_error: [400, 401, 403, 404, 422]
    server_error: [500, 502, 503]
    
  # 버전 관리
  versioning:
    method: "url_path"
    prefix_included: true
    
  # 페이지네이션
  pagination:
    required_for_list: true
    default_page_size: 20
    max_page_size: 100
    spring_data_pageable: true
    parameters:
      page: "int, default=0"
      size: "int, default=20"
      
  # 요청/응답 모델
  models:
    request_wrapper: "dto/*Request.java"
    response_wrapper: "dto/*Response.java"
    use_javabeans: true
    
  # 인증
  authentication:
    default_required: true
    method: "JWT"
    security_config: "SecurityConfig.java"
    exclude_paths:
      - "/api/v1/auth/login"
      - "/api/v1/auth/register"
      - "/api/v1/auth/refresh"
    
  # Spring 특성
  spring:
    use_spring_valid: true
    use_spring_validation: true
    use_lombok: true
    use_mapstruct: true  # DTO 변환